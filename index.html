<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বাংলাকোড — Bangla Programming Language</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0e1117;
    --surface:   #161b24;
    --panel:     #1c2333;
    --border:    #2a3346;
    --accent:    #e8a94a;
    --accent2:   #5ba3f5;
    --green:     #4ec97b;
    --red:       #f07070;
    --muted:     #5a6680;
    --text:      #d4daf0;
    --text-dim:  #8899bb;

    /* syntax */
    --kw:        #e8a94a;
    --fn:        #5ba3f5;
    --str:       #82d9a0;
    --num:       #c9a6ff;
    --comment:   #4a5a74;
    --op:        #f07070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans Bengali', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: .5px;
    user-select: none;
  }
  .logo span { color: var(--text-dim); font-weight: 400; font-size: 13px; margin-left: 8px; }

  .topbar-spacer { flex: 1; }

  .run-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--green);
    color: #0a1a10;
    border: none;
    border-radius: 6px;
    padding: 7px 20px;
    font-size: 15px;
    font-family: 'Noto Sans Bengali', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, transform .1s;
    flex-shrink: 0;
  }
  .run-btn:hover { background: #6fdea0; }
  .run-btn:active { transform: scale(.97); }
  .run-btn svg { width: 15px; height: 15px; }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 14px;
    font-family: 'Noto Sans Bengali', sans-serif;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── MAIN LAYOUT ── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-section {
    padding: 12px 0 6px;
  }

  .sidebar-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 0 14px 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .snippet-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 7px 14px;
    font-size: 13px;
    font-family: 'Noto Sans Bengali', sans-serif;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background .1s, color .1s, border-color .1s;
  }
  .snippet-btn:hover {
    background: var(--panel);
    color: var(--text);
    border-left-color: var(--accent);
  }
  .snippet-btn .tag {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    display: block;
  }

  /* ── EDITOR ── */
  .editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .pane-header {
    padding: 8px 14px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .pane-header .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  }

  .editor-wrap {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  .line-numbers {
    width: 44px;
    padding: 14px 8px 14px 0;
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    background: var(--panel);
    user-select: none;
    overflow: hidden;
    flex-shrink: 0;
    line-height: 21px;
  }

  .code-editor {
    flex: 1;
    background: transparent;
    color: transparent;
    caret-color: var(--accent);
    border: none;
    outline: none;
    resize: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 21px;
    padding: 14px 14px 14px 10px;
    overflow: auto;
    white-space: pre;
    spellcheck: false;
    position: absolute;
    top: 0; left: 44px; right: 0; bottom: 0;
    z-index: 2;
  }

  .highlight-layer {
    position: absolute;
    top: 0; left: 44px; right: 0; bottom: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 21px;
    padding: 14px 14px 14px 10px;
    overflow: hidden;
    pointer-events: none;
    white-space: pre;
    z-index: 1;
    color: var(--text);
    background: var(--panel);
  }

  /* ── OUTPUT PANE ── */
  .output-pane {
    width: 380px;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
  }

  .output-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    background: var(--bg);
  }

  .output-body:empty::before {
    content: "▸ চালান-বাটন চাপুন...";
    color: var(--muted);
    font-size: 13px;
    font-family: 'Noto Sans Bengali', sans-serif;
  }

  .out-line { display: block; color: var(--text); word-break: break-word; }
  .out-line.error { color: var(--red); }
  .out-line.info  { color: var(--accent2); }
  .out-line.sep   { color: var(--border); user-select: none; }
  .out-line.ok    { color: var(--green); }
  .out-line.bn    { font-family: 'Noto Sans Bengali', 'JetBrains Mono', monospace; }

  /* ── STATUS BAR ── */
  .statusbar {
    height: 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 14px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    flex-shrink: 0;
  }
  .statusbar .accent { color: var(--accent); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* syntax highlight spans */
  .hl-kw      { color: var(--kw); font-weight: 700; }
  .hl-fn      { color: var(--fn); }
  .hl-str     { color: var(--str); }
  .hl-num     { color: var(--num); }
  .hl-comment { color: var(--comment); font-style: italic; }
  .hl-op      { color: var(--op); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">বাংলাকোড <span>v1.0 — Bangla Toy Language</span></div>
  <div class="topbar-spacer"></div>
  <button class="clear-btn" id="clearBtn">পরিষ্কার</button>
  <button class="run-btn" id="runBtn">
    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 2.5l11 5.5-11 5.5V2.5z"/></svg>
    চালাও ▶
  </button>
</div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">উদাহরণ</div>
      <button class="snippet-btn" data-snippet="hello">
        হ্যালো ওয়ার্ল্ড
        <span class="tag">দেখাও</span>
      </button>
      <button class="snippet-btn" data-snippet="variable">
        চলক ব্যবহার
        <span class="tag">ধরো</span>
      </button>
      <button class="snippet-btn" data-snippet="ifelse">
        শর্ত পরীক্ষা
        <span class="tag">যদি / নাহলে</span>
      </button>
      <button class="snippet-btn" data-snippet="loop">
        লুপ
        <span class="tag">যতক্ষণ</span>
      </button>
      <button class="snippet-btn" data-snippet="function">
        ফাংশন
        <span class="tag">কাজ / ফেরত</span>
      </button>
      <button class="snippet-btn" data-snippet="fizzbuzz">
        ফিজবাজ
        <span class="tag">লজিক</span>
      </button>
      <button class="snippet-btn" data-snippet="factorial">
        ফ্যাক্টোরিয়াল
        <span class="tag">পুনরাবৃত্তি</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">কীওয়ার্ড</div>
      <button class="snippet-btn" data-insert="ধরো ">ধরো <span class="tag">= let</span></button>
      <button class="snippet-btn" data-insert="দেখাও ">দেখাও <span class="tag">= print</span></button>
      <button class="snippet-btn" data-insert="যদি ">যদি <span class="tag">= if</span></button>
      <button class="snippet-btn" data-insert="নাহলে">নাহলে <span class="tag">= else</span></button>
      <button class="snippet-btn" data-insert="যতক্ষণ ">যতক্ষণ <span class="tag">= while</span></button>
      <button class="snippet-btn" data-insert="কাজ ">কাজ <span class="tag">= function</span></button>
      <button class="snippet-btn" data-insert="ফেরত ">ফেরত <span class="tag">= return</span></button>
      <button class="snippet-btn" data-insert="সত্য">সত্য <span class="tag">= true</span></button>
      <button class="snippet-btn" data-insert="মিথ্যা">মিথ্যা <span class="tag">= false</span></button>
    </div>
  </div>

  <!-- EDITOR -->
  <div class="editor-pane">
    <div class="pane-header"><span class="dot"></span>main.bnk</div>
    <div class="editor-wrap">
      <div class="line-numbers" id="lineNums">1</div>
      <div class="highlight-layer" id="highlight"></div>
      <textarea class="code-editor" id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="output-pane">
    <div class="pane-header"><span class="dot" style="background:var(--green)"></span>আউটপুট</div>
    <div class="output-body" id="output"></div>
  </div>

</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <span>বাংলাকোড</span>
  <span id="statusLine">লাইন ১, কলাম ১</span>
  <span class="accent" id="statusMsg">প্রস্তুত</span>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  SNIPPETS
// ═══════════════════════════════════════════════════════
const SNIPPETS = {
  hello: `// প্রথম বাংলাকোড প্রোগ্রাম
দেখাও "নমস্কার, পৃথিবী!"
দেখাও "বাংলাকোড-এ স্বাগতম।"`,

  variable: `// চলক ব্যবহার
ধরো নাম = "রাহেলা"
ধরো বয়স = ২০
ধরো শহর = "রাজশাহী"

দেখাও "নাম: " + নাম
দেখাও "বয়স: " + বয়স
দেখাও "শহর: " + শহর`,

  ifelse: `// শর্ত পরীক্ষা
ধরো নম্বর = ৭৫

যদি নম্বর >= ৮০ {
  দেখাও "ফলাফল: এ+"
} নাহলে যদি নম্বর >= ৭০ {
  দেখাও "ফলাফল: এ"
} নাহলে যদি নম্বর >= ৬০ {
  দেখাও "ফলাফল: বি"
} নাহলে {
  দেখাও "ফলাফল: অকৃতকার্য"
}`,

  loop: `// যতক্ষণ লুপ
ধরো গণনা = ১

যতক্ষণ গণনা <= ৫ {
  দেখাও গণনা + " নম্বর রাউন্ড"
  গণনা = গণনা + ১
}

দেখাও "শেষ!"`,

  function: `// ফাংশন তৈরি
কাজ যোগ(ক, খ) {
  ফেরত ক + খ
}

কাজ অভিনন্দন(নাম) {
  দেখাও "অভিনন্দন, " + নাম + "!"
}

ধরো ফলাফল = যোগ(১৫, ২৭)
দেখাও "১৫ + ২৭ = " + ফলাফল

অভিনন্দন("করিম")`,

  fizzbuzz: `// ফিজবাজ
ধরো সংখ্যা = ১

যতক্ষণ সংখ্যা <= ২০ {
  যদি সংখ্যা % ১৫ == ০ {
    দেখাও "ফিজবাজ"
  } নাহলে যদি সংখ্যা % ৩ == ০ {
    দেখাও "ফিজ"
  } নাহলে যদি সংখ্যা % ৫ == ০ {
    দেখাও "বাজ"
  } নাহলে {
    দেখাও সংখ্যা
  }
  সংখ্যা = সংখ্যা + ১
}`,

  factorial: `// ফ্যাক্টোরিয়াল
কাজ ফ্যাক্টোরিয়াল(ন) {
  যদি ন <= ১ {
    ফেরত ১
  }
  ফেরত ন * ফ্যাক্টোরিয়াল(ন - ১)
}

ধরো ই = ১
যতক্ষণ ই <= ৮ {
  দেখাও ই + "! = " + ফ্যাক্টোরিয়াল(ই)
  ই = ই + ১
}`
};

// ═══════════════════════════════════════════════════════
//  SYNTAX HIGHLIGHTER
// ═══════════════════════════════════════════════════════
const KEYWORDS = ['ধরো','দেখাও','যদি','নাহলে','যতক্ষণ','কাজ','ফেরত','সত্য','মিথ্যা'];

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(code) {
  // Process line by line
  return code.split('\n').map(line => {
    // Comments
    if (/^\s*\/\//.test(line)) {
      return `<span class="hl-comment">${escapeHtml(line)}</span>`;
    }

    let out = '';
    let i = 0;
    while (i < line.length) {
      // comment inline
      if (line[i] === '/' && line[i+1] === '/') {
        out += `<span class="hl-comment">${escapeHtml(line.slice(i))}</span>`;
        break;
      }
      // string
      if (line[i] === '"') {
        let j = i+1;
        while (j < line.length && line[j] !== '"') j++;
        out += `<span class="hl-str">${escapeHtml(line.slice(i, j+1))}</span>`;
        i = j+1;
        continue;
      }
      // number (ASCII or Bengali digits)
      if (/[0-9০-৯]/.test(line[i])) {
        let j = i;
        while (j < line.length && /[0-9০-৯.]/.test(line[j])) j++;
        out += `<span class="hl-num">${escapeHtml(line.slice(i,j))}</span>`;
        i = j;
        continue;
      }
      // operators
      if (/[+\-*/%=<>!&|]/.test(line[i])) {
        out += `<span class="hl-op">${escapeHtml(line[i])}</span>`;
        i++; continue;
      }
      // keyword / identifier
      if (/[\u0980-\u09FF\w]/.test(line[i])) {
        let j = i;
        while (j < line.length && /[\u0980-\u09FF\w]/.test(line[j])) j++;
        const word = line.slice(i, j);
        if (KEYWORDS.includes(word)) {
          out += `<span class="hl-kw">${escapeHtml(word)}</span>`;
        } else {
          // peek if followed by (
          const rest = line.slice(j).trimStart();
          if (rest.startsWith('(')) {
            out += `<span class="hl-fn">${escapeHtml(word)}</span>`;
          } else {
            out += escapeHtml(word);
          }
        }
        i = j; continue;
      }
      out += escapeHtml(line[i]);
      i++;
    }
    return out;
  }).join('\n');
}

// ═══════════════════════════════════════════════════════
//  LEXER / PARSER / INTERPRETER
// ═══════════════════════════════════════════════════════

// Normalize Bengali digits to ASCII for arithmetic
function normDigits(s) {
  return s.replace(/[০১২৩৪৫৬৭৮৯]/g, d => '০১২৩৪৫৬৭৮৯'.indexOf(d));
}

// Tokenizer
const TT = {
  NUM:'NUM', STR:'STR', IDENT:'IDENT', KW:'KW',
  PLUS:'+', MINUS:'-', STAR:'*', SLASH:'/', MOD:'%',
  EQ:'==', NEQ:'!=', LT:'<', LTE:'<=', GT:'>', GTE:'>=',
  ASSIGN:'=', LPAREN:'(', RPAREN:')', LBRACE:'{', RBRACE:'}',
  COMMA:',', EOF:'EOF', AND:'&&', OR:'||', NOT:'!'
};

function tokenize(src) {
  const tokens = [];
  let i = 0;
  while (i < src.length) {
    const c = src[i];
    if (/[ \t\r\n]/.test(c)) { i++; continue; }
    if (c === '/' && src[i+1] === '/') { while (i < src.length && src[i] !== '\n') i++; continue; }

    // String
    if (c === '"') {
      let j = i+1, s = '';
      while (j < src.length && src[j] !== '"') s += src[j++];
      tokens.push({ type: TT.STR, val: s }); i = j+1; continue;
    }

    // Number (Bengali or ASCII)
    if (/[0-9০-৯]/.test(c)) {
      let j = i, s = '';
      while (j < src.length && /[0-9০-৯.]/.test(src[j])) s += src[j++];
      tokens.push({ type: TT.NUM, val: parseFloat(normDigits(s)) }); i = j; continue;
    }

    // Identifier / keyword
    if (/[\u0980-\u09FF\u00C0-\u024Fa-zA-Z_]/.test(c)) {
      let j = i, s = '';
      while (j < src.length && /[\u0980-\u09FF\u00C0-\u024Fa-zA-Z_0-9০-৯]/.test(src[j])) s += src[j++];
      const kws = ['ধরো','দেখাও','যদি','নাহলে','যতক্ষণ','কাজ','ফেরত','সত্য','মিথ্যা'];
      tokens.push({ type: kws.includes(s) ? TT.KW : TT.IDENT, val: s });
      i = j; continue;
    }

    // Two-char ops
    if (c === '=' && src[i+1] === '=') { tokens.push({type:TT.EQ}); i+=2; continue; }
    if (c === '!' && src[i+1] === '=') { tokens.push({type:TT.NEQ}); i+=2; continue; }
    if (c === '<' && src[i+1] === '=') { tokens.push({type:TT.LTE}); i+=2; continue; }
    if (c === '>' && src[i+1] === '=') { tokens.push({type:TT.GTE}); i+=2; continue; }
    if (c === '&' && src[i+1] === '&') { tokens.push({type:TT.AND}); i+=2; continue; }
    if (c === '|' && src[i+1] === '|') { tokens.push({type:TT.OR}); i+=2; continue; }

    // Single-char
    const map = {'+':TT.PLUS,'-':TT.MINUS,'*':TT.STAR,'/':TT.SLASH,'%':TT.MOD,
                 '=':TT.ASSIGN,'<':TT.LT,'>':TT.GT,'(':TT.LPAREN,')':TT.RPAREN,
                 '{':TT.LBRACE,'}':TT.RBRACE,',':TT.COMMA,'!':TT.NOT};
    if (map[c]) { tokens.push({type:map[c]}); i++; continue; }
    throw new Error(`অজানা চিহ্ন: '${c}'`);
  }
  tokens.push({type:TT.EOF});
  return tokens;
}

// ── Parser → AST ──
class Parser {
  constructor(tokens) {
    this.tokens = tokens;
    this.pos = 0;
  }
  peek() { return this.tokens[this.pos]; }
  consume(type) {
    const t = this.tokens[this.pos];
    if (type && t.type !== type) throw new Error(`প্রত্যাশিত ${type}, পাওয়া গেছে '${t.val||t.type}'`);
    this.pos++;
    return t;
  }
  match(...types) {
    if (types.includes(this.peek().type)) { this.pos++; return true; }
    return false;
  }

  parseProgram() {
    const stmts = [];
    while (this.peek().type !== TT.EOF) stmts.push(this.parseStatement());
    return { type:'Program', body: stmts };
  }

  parseStatement() {
    const t = this.peek();

    // ধরো
    if (t.type === TT.KW && t.val === 'ধরো') {
      this.consume(); const name = this.consume(TT.IDENT).val;
      this.consume(TT.ASSIGN); const val = this.parseExpr();
      return { type:'VarDecl', name, val };
    }
    // দেখাও
    if (t.type === TT.KW && t.val === 'দেখাও') {
      this.consume(); const val = this.parseExpr();
      return { type:'Print', val };
    }
    // ফেরত
    if (t.type === TT.KW && t.val === 'ফেরত') {
      this.consume();
      const val = this.peek().type !== TT.RBRACE ? this.parseExpr() : null;
      return { type:'Return', val };
    }
    // যদি
    if (t.type === TT.KW && t.val === 'যদি') {
      return this.parseIf();
    }
    // যতক্ষণ
    if (t.type === TT.KW && t.val === 'যতক্ষণ') {
      this.consume(); const cond = this.parseExpr();
      const body = this.parseBlock();
      return { type:'While', cond, body };
    }
    // কাজ
    if (t.type === TT.KW && t.val === 'কাজ') {
      this.consume(); const name = this.consume(TT.IDENT).val;
      this.consume(TT.LPAREN);
      const params = [];
      while (this.peek().type !== TT.RPAREN) {
        params.push(this.consume(TT.IDENT).val);
        if (this.peek().type === TT.COMMA) this.consume();
      }
      this.consume(TT.RPAREN);
      const body = this.parseBlock();
      return { type:'FuncDef', name, params, body };
    }
    // Assignment: ident = expr
    if (t.type === TT.IDENT && this.tokens[this.pos+1]?.type === TT.ASSIGN) {
      const name = this.consume(TT.IDENT).val;
      this.consume(TT.ASSIGN); const val = this.parseExpr();
      return { type:'Assign', name, val };
    }
    // expression statement (function call)
    const expr = this.parseExpr();
    return { type:'ExprStmt', expr };
  }

  parseIf() {
    this.consume(); // যদি
    const cond = this.parseExpr();
    const then = this.parseBlock();
    let otherwise = null;
    if (this.peek().type === TT.KW && this.peek().val === 'নাহলে') {
      this.consume();
      if (this.peek().type === TT.KW && this.peek().val === 'যদি') {
        otherwise = [this.parseIf()];
      } else {
        otherwise = this.parseBlock();
      }
    }
    return { type:'If', cond, then, otherwise };
  }

  parseBlock() {
    this.consume(TT.LBRACE);
    const stmts = [];
    while (this.peek().type !== TT.RBRACE && this.peek().type !== TT.EOF)
      stmts.push(this.parseStatement());
    this.consume(TT.RBRACE);
    return stmts;
  }

  // Expressions: precedence climbing
  parseExpr() { return this.parseOr(); }

  parseOr() {
    let l = this.parseAnd();
    while (this.peek().type === TT.OR) { this.consume(); l = {type:'BinOp',op:'||',l,r:this.parseAnd()}; }
    return l;
  }
  parseAnd() {
    let l = this.parseEquality();
    while (this.peek().type === TT.AND) { this.consume(); l = {type:'BinOp',op:'&&',l,r:this.parseEquality()}; }
    return l;
  }
  parseEquality() {
    let l = this.parseCompar();
    while ([TT.EQ,TT.NEQ].includes(this.peek().type)) {
      const op = this.consume().type; l = {type:'BinOp',op,l,r:this.parseCompar()};
    }
    return l;
  }
  parseCompar() {
    let l = this.parseAdd();
    while ([TT.LT,TT.LTE,TT.GT,TT.GTE].includes(this.peek().type)) {
      const op = this.consume().type; l = {type:'BinOp',op,l,r:this.parseAdd()};
    }
    return l;
  }
  parseAdd() {
    let l = this.parseMul();
    while ([TT.PLUS,TT.MINUS].includes(this.peek().type)) {
      const op = this.consume().type; l = {type:'BinOp',op,l,r:this.parseMul()};
    }
    return l;
  }
  parseMul() {
    let l = this.parseUnary();
    while ([TT.STAR,TT.SLASH,TT.MOD].includes(this.peek().type)) {
      const op = this.consume().type; l = {type:'BinOp',op,l,r:this.parseUnary()};
    }
    return l;
  }
  parseUnary() {
    if (this.peek().type === TT.MINUS) { this.consume(); return {type:'Unary',op:'-',r:this.parseUnary()}; }
    if (this.peek().type === TT.NOT)   { this.consume(); return {type:'Unary',op:'!',r:this.parseUnary()}; }
    return this.parseCall();
  }
  parseCall() {
    let expr = this.parsePrimary();
    while (this.peek().type === TT.LPAREN) {
      this.consume(TT.LPAREN);
      const args = [];
      while (this.peek().type !== TT.RPAREN) {
        args.push(this.parseExpr());
        if (this.peek().type === TT.COMMA) this.consume();
      }
      this.consume(TT.RPAREN);
      expr = {type:'Call', callee: expr, args};
    }
    return expr;
  }
  parsePrimary() {
    const t = this.peek();
    if (t.type === TT.NUM)  { this.consume(); return {type:'Num', val:t.val}; }
    if (t.type === TT.STR)  { this.consume(); return {type:'Str', val:t.val}; }
    if (t.type === TT.KW && t.val === 'সত্য')  { this.consume(); return {type:'Bool',val:true}; }
    if (t.type === TT.KW && t.val === 'মিথ্যা') { this.consume(); return {type:'Bool',val:false}; }
    if (t.type === TT.IDENT){ this.consume(); return {type:'Var', name:t.val}; }
    if (t.type === TT.LPAREN) {
      this.consume(); const e = this.parseExpr(); this.consume(TT.RPAREN); return e;
    }
    throw new Error(`অপ্রত্যাশিত টোকেন: '${t.val||t.type}'`);
  }
}

// ── Interpreter ──
class ReturnSignal { constructor(v){this.val=v;} }

class Interpreter {
  constructor(output) {
    this.globals = {};
    this.output = output; // callback
    this.callDepth = 0;
  }
  run(node) {
    return this.execNode(node, this.globals);
  }
  execNode(node, env) {
    switch(node.type) {
      case 'Program': {
        let last;
        for (const s of node.body) last = this.execNode(s, env);
        return last;
      }
      case 'VarDecl': env[node.name] = this.eval(node.val, env); break;
      case 'Assign': {
        // Walk scope chain
        let e = env;
        while (e && !(node.name in e)) e = e.__parent__;
        if (e) e[node.name] = this.eval(node.val, env);
        else env[node.name] = this.eval(node.val, env);
        break;
      }
      case 'Print': {
        const v = this.eval(node.val, env);
        this.output(this.stringify(v));
        break;
      }
      case 'If': {
        if (this.truthy(this.eval(node.cond, env))) {
          return this.execBlock(node.then, env);
        } else if (node.otherwise) {
          return this.execBlock(node.otherwise, env);
        }
        break;
      }
      case 'While': {
        let iters = 0;
        while (this.truthy(this.eval(node.cond, env))) {
          if (++iters > 100000) throw new Error('অসীম লুপ শনাক্ত! (১০০,০০০ বার অতিক্রম)');
          const r = this.execBlock(node.body, env);
          if (r instanceof ReturnSignal) return r;
        }
        break;
      }
      case 'FuncDef':
        env[node.name] = { __fn__: true, params: node.params, body: node.body, closure: env };
        break;
      case 'Return':
        return new ReturnSignal(node.val ? this.eval(node.val, env) : null);
      case 'ExprStmt':
        return this.eval(node.expr, env);
    }
  }
  execBlock(stmts, parentEnv) {
    const env = { __parent__: parentEnv };
    for (const s of stmts) {
      const r = this.execNode(s, env);
      if (r instanceof ReturnSignal) return r;
    }
  }
  eval(node, env) {
    switch(node.type) {
      case 'Num': return node.val;
      case 'Str': return node.val;
      case 'Bool': return node.val;
      case 'Var': {
        let e = env;
        while (e) { if (node.name in e) return e[node.name]; e = e.__parent__; }
        throw new Error(`অপরিচিত চলক: '${node.name}'`);
      }
      case 'Unary': {
        const r = this.eval(node.r, env);
        if (node.op === '-') return -r;
        if (node.op === '!') return !this.truthy(r);
        break;
      }
      case 'BinOp': {
        const l = this.eval(node.l, env), r = this.eval(node.r, env);
        switch(node.op) {
          case '+':   return (typeof l === 'number' && typeof r === 'number') ? l+r : String(this.stringify(l))+this.stringify(r);
          case '-':   return l-r;
          case '*':   return l*r;
          case '/':   if(r===0) throw new Error('শূন্য দিয়ে ভাগ করা যায় না!'); return l/r;
          case '%':   return l%r;
          case '==':  return l===r;
          case '!=':  return l!==r;
          case '<':   return l<r;
          case '<=':  return l<=r;
          case '>':   return l>r;
          case '>=':  return l>=r;
          case '&&':  return this.truthy(l) && this.truthy(r);
          case '||':  return this.truthy(l) || this.truthy(r);
        }
        break;
      }
      case 'Call': {
        const fn = this.eval(node.callee, env);
        if (!fn || !fn.__fn__) throw new Error(`'${node.callee.name}' একটি ফাংশন নয়`);
        if (++this.callDepth > 500) throw new Error('স্ট্যাক ওভারফ্লো! অতিরিক্ত পুনরাবৃত্তি।');
        const fnEnv = { __parent__: fn.closure };
        fn.params.forEach((p,i) => fnEnv[p] = this.eval(node.args[i]||{type:'Num',val:0}, env));
        const r = this.execBlock(fn.body, fnEnv);
        this.callDepth--;
        return r instanceof ReturnSignal ? r.val : null;
      }
    }
    return null;
  }
  stringify(v) {
    if (v === null || v === undefined) return 'শূন্য';
    if (typeof v === 'boolean') return v ? 'সত্য' : 'মিথ্যা';
    if (typeof v === 'number') return Number.isInteger(v) ? String(v) : v.toFixed(6).replace(/\.?0+$/, '');
    return String(v);
  }
  truthy(v) { return v !== false && v !== null && v !== undefined && v !== 0 && v !== ''; }
}

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
const editor     = document.getElementById('editor');
const hlLayer    = document.getElementById('highlight');
const lineNums   = document.getElementById('lineNums');
const output     = document.getElementById('output');
const statusLine = document.getElementById('statusLine');
const statusMsg  = document.getElementById('statusMsg');

function doHighlight() {
  hlLayer.innerHTML = highlight(editor.value);
  lineNums.textContent = editor.value.split('\n').map((_,i) => i+1).join('\n');
  hlLayer.scrollTop  = editor.scrollTop;
  hlLayer.scrollLeft = editor.scrollLeft;
}

editor.addEventListener('input', doHighlight);
editor.addEventListener('scroll', () => {
  hlLayer.scrollTop  = editor.scrollTop;
  hlLayer.scrollLeft = editor.scrollLeft;
});

editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, en = editor.selectionEnd;
    editor.value = editor.value.substring(0,s) + '  ' + editor.value.substring(en);
    editor.selectionStart = editor.selectionEnd = s+2;
    doHighlight();
  }
});

editor.addEventListener('keyup', () => {
  const txt = editor.value.substring(0, editor.selectionStart);
  const row = txt.split('\n').length;
  const col = txt.split('\n').pop().length + 1;
  statusLine.textContent = `লাইন ${row}, কলাম ${col}`;
});

// Output helper
function addLine(text, cls='out-line') {
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = text;
  output.appendChild(span);
  output.scrollTop = output.scrollHeight;
}

// RUN
document.getElementById('runBtn').addEventListener('click', runCode);
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); runCode(); }
});

function runCode() {
  output.innerHTML = '';
  const code = editor.value.trim();
  if (!code) { addLine('কোড লিখুন এবং চালান।', 'out-line info'); return; }

  addLine('── চালু হচ্ছে ──────────────────', 'out-line sep');

  const t0 = performance.now();
  try {
    const tokens = tokenize(code);
    const ast    = new Parser(tokens).parseProgram();
    const interp = new Interpreter(text => addLine(text, 'out-line bn'));
    interp.run(ast);
    const ms = (performance.now()-t0).toFixed(1);
    addLine('── সম্পন্ন (' + ms + 'ms) ───────────', 'out-line sep');
    addLine('✓ সফলভাবে চলেছে', 'out-line ok');
    statusMsg.textContent = 'সফল ✓';
    statusMsg.style.color = 'var(--green)';
  } catch(err) {
    addLine('ত্রুটি: ' + err.message, 'out-line error');
    statusMsg.textContent = 'ত্রুটি ✗';
    statusMsg.style.color = 'var(--red)';
  }
  setTimeout(() => { statusMsg.textContent='প্রস্তুত'; statusMsg.style.color='var(--accent)'; }, 3000);
}

document.getElementById('clearBtn').addEventListener('click', () => { output.innerHTML=''; });

// SNIPPETS
document.querySelectorAll('[data-snippet]').forEach(btn => {
  btn.addEventListener('click', () => {
    editor.value = SNIPPETS[btn.dataset.snippet] || '';
    doHighlight();
    editor.focus();
  });
});
document.querySelectorAll('[data-insert]').forEach(btn => {
  btn.addEventListener('click', () => {
    const s = editor.selectionStart, en = editor.selectionEnd;
    const ins = btn.dataset.insert;
    editor.value = editor.value.substring(0,s) + ins + editor.value.substring(en);
    editor.selectionStart = editor.selectionEnd = s + ins.length;
    doHighlight(); editor.focus();
  });
});

// Init
editor.value = SNIPPETS.hello;
doHighlight();
</script>
</body>
