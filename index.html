<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>বাংলাকোড — Bangla Programming Language</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">বাংলাকোড <span>v1.0 — Bangla Toy Language</span></div>
  <div class="topbar-spacer"></div>
  <button class="clear-btn" id="clearBtn">পরিষ্কার</button>
  <button class="run-btn" id="runBtn">
    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 2.5l11 5.5-11 5.5V2.5z"/></svg>
    চালাও ▶
  </button>
</div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">উদাহরণ</div>
      <button class="snippet-btn" data-snippet="hello">
        হ্যালো ওয়ার্ল্ড
        <span class="tag">দেখাও</span>
      </button>
      <button class="snippet-btn" data-snippet="variable">
        চলক ব্যবহার
        <span class="tag">ধরো</span>
      </button>
      <button class="snippet-btn" data-snippet="ifelse">
        শর্ত পরীক্ষা
        <span class="tag">যদি / নাহলে</span>
      </button>
      <button class="snippet-btn" data-snippet="loop">
        লুপ
        <span class="tag">যতক্ষণ</span>
      </button>
      <button class="snippet-btn" data-snippet="function">
        ফাংশন
        <span class="tag">কাজ / ফেরত</span>
      </button>

      <button class="snippet-btn" data-snippet="factorial">
        ফ্যাক্টোরিয়াল
        <span class="tag">পুনরাবৃত্তি</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">কীওয়ার্ড</div>
      <button class="snippet-btn" data-insert="ধরো ">ধরো <span class="tag">= let</span></button>
      <button class="snippet-btn" data-insert="দেখাও ">দেখাও <span class="tag">= print</span></button>
      <button class="snippet-btn" data-insert="যদি ">যদি <span class="tag">= if</span></button>
      <button class="snippet-btn" data-insert="নাহলে">নাহলে <span class="tag">= else</span></button>
      <button class="snippet-btn" data-insert="যতক্ষণ ">যতক্ষণ <span class="tag">= while</span></button>
      <button class="snippet-btn" data-insert="কাজ ">কাজ <span class="tag">= function</span></button>
      <button class="snippet-btn" data-insert="ফেরত ">ফেরত <span class="tag">= return</span></button>
      <button class="snippet-btn" data-insert="সত্য">সত্য <span class="tag">= true</span></button>
      <button class="snippet-btn" data-insert="মিথ্যা">মিথ্যা <span class="tag">= false</span></button>
    </div>
  </div>

  <!-- EDITOR -->
  <div class="editor-pane">
    <div class="pane-header"><span class="dot"></span>main.bnk</div>
    <div class="editor-wrap">
      <div class="line-numbers" id="lineNums">1</div>
      <div class="highlight-layer" id="highlight"></div>
      <textarea class="code-editor" id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="output-pane">
    <div class="pane-header"><span class="dot" style="background:var(--green)"></span>আউটপুট</div>
    <div class="output-body" id="output"></div>
  </div>

</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <span>বাংলাকোড</span>
  <span id="statusLine">লাইন ১, কলাম ১</span>
  <span class="accent" id="statusMsg">প্রস্তুত</span>
</div>

<script src="script.js"></script>
</body>
</html>
